<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>실시간 통역 / Live Interpretation</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, system-ui, sans-serif;
         background: #0f1115; color: #e8eaed;
         height: 100vh; height: 100dvh; /* dvh: 모바일 주소창 영역 제외(스크롤바 방지), vh는 폴백 */
         display: flex; flex-direction: column; align-items: center; }
  header { padding: 24px 16px 8px; text-align: center; }
  h1 { font-size: 18px; font-weight: 600; margin: 0; }
  .status { margin-top: 6px; font-size: 13px; color: #9aa0a6; }
  .status.live { color: #34d399; }
  main { flex: 1; width: 100%; max-width: 420px; padding: 16px;
         display: flex; flex-direction: column; gap: 12px; }
  .label { font-size: 13px; color: #9aa0a6; margin-top: 8px; }
  .langs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  button.lang { padding: 16px; font-size: 16px; border-radius: 12px; border: 1px solid #2a2e37;
         background: #1a1d24; color: #e8eaed; cursor: pointer; }
  button.lang.sel { background: #2563eb; border-color: #2563eb; color: #fff; font-weight: 600; }
  .big { margin-top: auto; padding: 18px; font-size: 17px; font-weight: 600; border: none;
         border-radius: 14px; background: #34d399; color: #06281e; cursor: pointer; }
  .big.stop { background: #ef4444; color: #fff; }
  .big:disabled { opacity: .4; }
  .hint { font-size: 12px; color: #6b7280; text-align: center; line-height: 1.5; }
  .caption { flex: 1; min-height: 110px; margin-top: 8px; padding: 14px 16px;
         border-radius: 12px; background: #11141a; border: 1px solid #2a2e37;
         display: flex; flex-direction: column; justify-content: flex-end; gap: 8px;
         overflow: hidden; }
  /* 직전 문장(흐리게, 위) + 현재 문장(또렷, 아래·하단정렬) — 문장 끝에만 한 칸 이동 */
  .cap-prev { font-size: 15px; line-height: 1.4; color: #9aa0a6; opacity: .55;
         white-space: pre-wrap; word-break: break-word; }
  .cap-cur { font-size: 21px; line-height: 1.5; color: #f1f3f4; font-weight: 500;
         white-space: pre-wrap; word-break: break-word; }
  .cap-cur.placeholder { font-size: 14px; font-weight: 400; color: #4b5563; }
</style>
</head>
<body>
<header>
  <h1>실시간 통역</h1>
  <div id="status" class="status">연결 중…</div>
</header>
<main>
  <div class="label">언어 선택 / Select language</div>
  <div class="langs" id="langs"></div>
  <div class="label">실시간 자막 / Live subtitles</div>
  <div id="caption" class="caption">
    <div id="cap-prev" class="cap-prev"></div>
    <div id="cap-cur" class="cap-cur"></div>
  </div>
  <button id="toggle" class="big" disabled>듣기 시작</button>
  <div class="hint">언어를 고르고 <b>듣기 시작</b>을 누른 뒤 대기하세요.<br>
       예배가 시작되면 자동으로 통역 음성이 나옵니다.</div>
</main>
<script>
const LANGS = [
  { code: "en", name: "English" },
  { code: "vi", name: "Tiếng Việt" },
  { code: "zh", name: "中文" },
  { code: "ja", name: "日本語" },
];
const OUT_RATE = 24000;

let selected = localStorage.getItem("lang") || "en";
let ws = null, audioCtx = null, playHead = 0, listening = false, live = false;

const statusEl = document.getElementById("status");
const toggleEl = document.getElementById("toggle");
const langsEl = document.getElementById("langs");
const capPrevEl = document.getElementById("cap-prev");
const capCurEl = document.getElementById("cap-cur");
let prevSentence = "", curSentence = "";
const SENT_END = /[.?!。！？]$/;

function renderLangs() {
  langsEl.innerHTML = "";
  for (const l of LANGS) {
    const b = document.createElement("button");
    b.className = "lang" + (l.code === selected ? " sel" : "");
    b.textContent = l.name;
    b.onclick = () => {
      selected = l.code; localStorage.setItem("lang", l.code);
      renderLangs();
      if (listening) { stop(); start(); }  // 언어 바꾸면 재접속
    };
    langsEl.appendChild(b);
  }
}

function setStatus(text, isLive) {
  statusEl.textContent = text;
  statusEl.classList.toggle("live", !!isLive);
}

function renderCaption() {
  capPrevEl.textContent = prevSentence;
  if (!prevSentence && !curSentence) {
    capCurEl.textContent = "자막이 여기에 표시됩니다 / Subtitles appear here";
    capCurEl.classList.add("placeholder");
  } else {
    capCurEl.textContent = curSentence;
    capCurEl.classList.remove("placeholder");
  }
}

function clearCaption() { prevSentence = ""; curSentence = ""; renderCaption(); }

function addCaption(delta) {
  curSentence += delta;
  const trimmed = curSentence.replace(/\s+$/, "");
  if (trimmed.length >= 2 && SENT_END.test(trimmed)) {
    // 문장 완성 → 직전 문장으로 이월, 현재 비움 (위로 이동은 여기서만)
    prevSentence = trimmed;
    curSentence = "";
  } else if (curSentence.length > 160) {
    // 문장부호 없이 길어지면 마지막 콤마/공백에서 끊어 이월(과성장 방지)
    const cut = Math.max(curSentence.lastIndexOf(", "), curSentence.lastIndexOf(" "));
    if (cut > 40) {
      prevSentence = curSentence.slice(0, cut + 1).trim();
      curSentence = curSentence.slice(cut + 1);
    } else {
      prevSentence = curSentence.trim();
      curSentence = "";
    }
  }
  renderCaption();
}

function start() {
  clearCaption();
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  audioCtx.resume();
  playHead = audioCtx.currentTime + 0.15;
  const proto = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${proto}://${location.host}/listen?lang=${selected}`);
  ws.binaryType = "arraybuffer";
  ws.onmessage = (ev) => {
    if (typeof ev.data === "string") {
      const m = JSON.parse(ev.data);
      if (m.type === "status") { live = m.live; updateStatus(); }
      else if (m.type === "transcript") { addCaption(m.text); }
      return;
    }
    playChunk(new Int16Array(ev.data));
  };
  ws.onclose = () => { if (listening) setStatus("재연결 중…", false); };
  ws.onopen = () => updateStatus();
  listening = true;
  toggleEl.textContent = "듣기 중지";
  toggleEl.classList.add("stop");
  toggleEl.disabled = false;
}

function stop() {
  listening = false;
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
  toggleEl.textContent = "듣기 시작";
  toggleEl.classList.remove("stop");
  updateStatus();
}

function updateStatus() {
  if (!listening) { setStatus("대기 — 언어를 고르고 듣기 시작", false); return; }
  setStatus(live ? "● 통역 진행 중 (LIVE)" : "대기 중 — 진행 중인 예배 없음", live);
}

function playChunk(int16) {
  if (!audioCtx) return;
  const f32 = new Float32Array(int16.length);
  for (let i = 0; i < int16.length; i++) f32[i] = int16[i] / 32768;
  const buf = audioCtx.createBuffer(1, f32.length, OUT_RATE);
  buf.getChannelData(0).set(f32);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.connect(audioCtx.destination);
  const now = audioCtx.currentTime;
  if (playHead < now) playHead = now + 0.05;  // 언더런이면 약간 미래로
  src.start(playHead);
  playHead += buf.duration;
}

toggleEl.onclick = () => { listening ? stop() : start(); };
renderLangs();
updateStatus();
renderCaption();
toggleEl.disabled = false;
</script>
</body>
</html>
